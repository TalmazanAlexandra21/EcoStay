<script>
    async function incarcaCabane() {
        try {
            const res = await fetch('http://localhost:3000/cabane');
            const data = await res.json();
            
            const container = document.getElementById('lista-cabane');
            if (container) {
                container.innerHTML = data.map(c => `
                    <div class="card">
                        <h3>${c.nume}</h3>
                        <p>Preț: ${c.pret} RON</p>
                    </div>
                `).join('');
            }
        } catch (err) {
            console.error("Eroare la încărcarea cabanelor:", err);
        }
    }
    // incarcaCabane(); // Funcția este dezactivată pentru pagina Home
</script>
